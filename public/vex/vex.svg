<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 470" width="360" height="470">
  <!-- Vex — royal fox familiar of MCP Queen. Layer groups are named for Rive/Lottie:
       #crown #tail #ears #head #muzzle #face(eyes+mouth). Swap #face contents for expressions. -->
  <defs>
    <linearGradient id="gFore" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#b98cff"/><stop offset="1" stop-color="#8f5cf0"/></linearGradient>
    <linearGradient id="gSide" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8a54e6"/><stop offset="1" stop-color="#6b3fc4"/></linearGradient>
    <linearGradient id="gSideR" x1="1" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#8a54e6"/><stop offset="1" stop-color="#6b3fc4"/></linearGradient>
    <linearGradient id="gCheek" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#6f43cc"/><stop offset="1" stop-color="#4e2c99"/></linearGradient>
    <linearGradient id="gJaw" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#563099"/><stop offset="1" stop-color="#3c2178"/></linearGradient>
    <linearGradient id="gMuz" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#efe6fb"/><stop offset="1" stop-color="#cdbaf0"/></linearGradient>
    <linearGradient id="gMuzSh" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#d9c9f4"/><stop offset="1" stop-color="#b7a1e6"/></linearGradient>
    <radialGradient id="gEarGlow" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#e6ccff"/><stop offset="1" stop-color="#9a63f0"/></radialGradient>
    <linearGradient id="gCrown" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#ffe49a"/><stop offset="0.5" stop-color="#f4b942"/><stop offset="1" stop-color="#d98f1e"/></linearGradient>
    <linearGradient id="gTail" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#8a54e6"/><stop offset="1" stop-color="#5f36b0"/></linearGradient>
    <radialGradient id="gEye" cx="0.42" cy="0.36" r="0.75"><stop offset="0" stop-color="#3a2a63"/><stop offset="0.55" stop-color="#180d33"/><stop offset="1" stop-color="#0c0620"/></radialGradient>
    <radialGradient id="gFloor" cx="0.5" cy="0.5" r="0.5"><stop offset="0" stop-color="#a06bff" stop-opacity=".5"/><stop offset="1" stop-color="#a06bff" stop-opacity="0"/></radialGradient>
    <filter id="soft"><feGaussianBlur stdDeviation="2.2"/></filter>
  </defs>

  <ellipse cx="180" cy="452" rx="120" ry="16" fill="url(#gFloor)" opacity=".7"/>

  <g id="crown">
    <path d="M148,66 L148,40 L164,52 L180,28 L196,52 L212,40 L212,66 Z" fill="url(#gCrown)" stroke="#c8801a" stroke-width="1"/>
    <rect x="148" y="64" width="64" height="9" rx="2" fill="url(#gCrown)" stroke="#c8801a" stroke-width="1"/>
    <circle cx="180" cy="28" r="3" fill="#fff3cf"/><circle cx="148" cy="40" r="2.4" fill="#ffe9b0"/><circle cx="212" cy="40" r="2.4" fill="#ffe9b0"/>
    <ellipse cx="180" cy="80" rx="30" ry="4" fill="#f4b942" opacity=".18" filter="url(#soft)"/>
  </g>

  <g id="tail">
    <path d="M232,320 C300,308 322,250 300,214 C316,258 292,300 246,318 C286,300 300,262 288,232 C296,268 268,300 232,308 Z" fill="url(#gTail)"/>
    <path d="M300,214 C314,224 316,246 305,258 C300,240 300,226 296,220 Z" fill="url(#gMuz)"/>
  </g>

  <g id="ears">
    <path d="M104,150 L120,74 L166,126 Z" fill="url(#gSide)"/>
    <path d="M256,150 L240,74 L194,126 Z" fill="url(#gSideR)"/>
    <path d="M120,140 L128,96 L156,128 Z" fill="url(#gEarGlow)" opacity=".92"/>
    <path d="M240,140 L232,96 L204,128 Z" fill="url(#gEarGlow)" opacity=".92"/>
  </g>

  <g id="head">
    <path d="M180,110 L112,142 L180,206 Z" fill="url(#gFore)"/>
    <path d="M180,110 L248,142 L180,206 Z" fill="url(#gFore)" opacity=".92"/>
    <path d="M112,142 L96,208 L180,206 Z" fill="url(#gSide)"/>
    <path d="M248,142 L264,208 L180,206 Z" fill="url(#gSideR)"/>
    <path d="M96,208 L128,272 L180,206 Z" fill="url(#gCheek)"/>
    <path d="M264,208 L232,272 L180,206 Z" fill="url(#gCheek)"/>
    <path d="M128,272 L160,314 L180,300 L180,206 Z" fill="url(#gJaw)"/>
    <path d="M232,272 L200,314 L180,300 L180,206 Z" fill="url(#gJaw)" opacity=".95"/>
    <path d="M160,314 L180,330 L180,300 Z" fill="#2f1a63"/>
    <path d="M200,314 L180,330 L180,300 Z" fill="#3a2178"/>
  </g>

  <g id="muzzle">
    <path d="M150,230 L210,230 L198,286 L180,306 L162,286 Z" fill="url(#gMuz)"/>
    <path d="M180,306 L162,286 L150,230 L180,238 Z" fill="url(#gMuzSh)" opacity=".55"/>
    <path d="M171,246 L189,246 L180,259 Z" fill="#241338"/>
    <ellipse cx="177" cy="249" rx="2" ry="1.3" fill="#5a3f86" opacity=".8"/>
  </g>

  <g id="face">
    <!-- expression: curious. Replace this group's contents to drive other states. -->
    <ellipse cx="147" cy="206" rx="17" ry="20" fill="url(#gEye)"/><circle cx="141" cy="199" r="4.6" fill="#fff"/><circle cx="152" cy="210" r="2" fill="#b98cff"/>
    <ellipse cx="213" cy="204" rx="17" ry="20" fill="url(#gEye)"/><circle cx="207" cy="197" r="4.6" fill="#fff"/><circle cx="218" cy="208" r="2" fill="#b98cff"/>
    <path d="M130,180 Q147,172 162,178" stroke="#c89bff" stroke-width="3" fill="none" stroke-linecap="round" opacity=".7"/>
    <path d="M170,272 Q180,282 190,272" stroke="#3a2178" stroke-width="3.4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
